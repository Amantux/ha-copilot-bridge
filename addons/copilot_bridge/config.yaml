name: "Copilot Bridge"
description: "Local GitHub Copilot bridge service for Home Assistant"
version: "0.1.8"
slug: "home-assistant-copilot-bridge"
init: false
startup: services
boot: auto
ingress: false
discovery:
  - copilot_bridge
watchdog: "http://[HOST]:[PORT:8099]/health"
url: "https://github.com/amantux/ha-copilot-bridge"
arch:
  - aarch64
  - amd64
  - armv7
map:
  - config:rw
options:
  bridge_api_key: ""
  github_token: ""
  github_oauth_client_id: ""
  github_oauth_scopes: "read:user"
  assistant_profile: "home_assistant_read_only_advisor"
  read_only_mode: true
  allow_home_assistant_actions: false
  allow_filesystem_access: false
  enable_integration_discovery: true
  enable_hacs_discovery: true
  enable_tooling_discovery: true
  enable_home_assistant_mcp: false
  home_assistant_mcp_url: ""
  home_assistant_mcp_bearer_token: ""
  home_assistant_mcp_api_key: ""
  allowed_paths: "/config"
  log_level: "info"
schema:
  bridge_api_key: password?
  github_token: password?
  github_oauth_client_id: str?
  github_oauth_scopes: str?
  assistant_profile: str?
  read_only_mode: bool?
  allow_home_assistant_actions: bool?
  allow_filesystem_access: bool?
  enable_integration_discovery: bool?
  enable_hacs_discovery: bool?
  enable_tooling_discovery: bool?
  enable_home_assistant_mcp: bool?
  home_assistant_mcp_url: str?
  home_assistant_mcp_bearer_token: password?
  home_assistant_mcp_api_key: password?
  allowed_paths: str
  log_level: list(trace|debug|info|warning|error)?
